# TMC Autotune (super-machine 2026-06-03)
# IMPORTANTE: autotune NO modifica run_current (la lee de [tmc2208]); solo
# optimiza chopper/PWM/CoolStep/hysteresis. Y se mantiene en 0.80A validados.
# Motor: creality-42-34 (estandar Ender 3 V3 KE). Extrusor EXCLUIDO (standalone, sin UART).
[autotune_tmc stepper_x]
motor: creality-42-34

[autotune_tmc stepper_y]
motor: creality-42-34

[autotune_tmc stepper_z]
motor: creality-42-34
