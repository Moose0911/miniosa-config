;============================
; Ender 3 V3 KE - Configuración Klipper optimizada
; Tamaño: 220x220x240
; MCU: GD32F303RET6 - CR4NS200323C10
;============================

[save_variables]
filename: ~/printer_data/config/variables.cfg   ; contador de mallas y otras variables persistentes

[include KAMP_Settings.cfg]    ; KAMP: malla adaptativa y purga de linea sobre el area del objeto
[include mainsail.cfg]         ; macros de Mainsail: PAUSE, RESUME, CANCEL_PRINT
[include gcode_macro.cfg]      ; macros personalizados: START_PRINT, END_PRINT, calibraciones, etc.
[exclude_object]               ; activa exclusion de objetos individuales durante una impresion
[include TEST_SPEED.cfg]       ; macro TEST_SPEED para encontrar velocidades/aceleraciones maximas
[include timelapse.cfg]        ; macro TIMELAPSE_TAKE_FRAME para timelapses con crowsnest
[include tmc_autotune.cfg]    ; TMC Autotune (no cambia corriente; optimiza chopper)
#[include ADXL345.cfg]         ; acelerometro para calibrar input shaper (descomentar al conectar)

;============================
; Sistema de archivos virtual y MCU
;============================

[virtual_sdcard]
path: ~/printer_data/gcodes    ; directorio donde Klipper busca los archivos .gcode

[mcu]
serial: /dev/serial/by-path/platform-5200000.usb-usb-0:1.3:1.0-port0 ; path estable del USB (no cambia como /dev/ttyUSB0)
baud:240000                    ; velocidad de comunicacion con la placa (debe coincidir con el firmware)
restart_method: command        ; reinicia la MCU via comando serial, sin reset fisico

[mcu CB1]
serial: /tmp/klipper_host_mcu  ; MCU virtual del BTT Pad 7 (acceso a GPIO del SBC)

[printer]
kinematics: cartesian          ; cinematica cartesiana: X Y Z son ejes independientes
max_velocity: 500 #max600      ; velocidad maxima de movimiento (mm/s)
max_accel: 18000                ; TOPE travel sostenible SIN mod de refrigeracion (mm/s²). 0.95A/24k cocinaba el driver (OTPW >120C en print real con cama caliente, ver olb/t120). 0.80A aguanta ~21k -> 18k con margen y termicamente OK. +50% vs los 12k viejos. Para subir a 24k: requiere disipadores+fan dedicado sobre los TMC2208. SOLO travel: accels de impresion los limita el slicer
max_z_velocity: 30             ; velocidad maxima del eje Z (mm/s) - limitado por el tornillo
square_corner_velocity: 8      ; velocidad al pasar esquinas a 90° (mm/s) - mayor = mas redondeo
max_z_accel: 300               ; aceleracion maxima del eje Z (mm/s²)
minimum_cruise_ratio: 0.5      ; fraccion minima del movimiento a velocidad crucero

[gcode_arcs]
resolution: 0.1                ; activa arcos G2/G3; precision de interpolacion (mm por segmento)

[idle_timeout]
timeout: 7200                  ; apaga motores y calentadores tras 2 horas de inactividad

[force_move]
enable_force_move: True        ; permite mover ejes sin homing previo (util para mantenimiento)

;============================
; Sensores de temperatura
;============================

[temperature_sensor host_temp]
sensor_type: temperature_host  ; temperatura de la CPU del BTT Pad 7 (visible en Mainsail)
min_temp: 0
max_temp: 100

#[temperature_sensor mcu] ; no soportado por la placa original de la ender 3 v3Ke
#sensor_type: temperature_mcu

;============================
; Motores
;============================

[stepper_x]
step_pin: PC2
dir_pin: !PB9                  ; ! = direccion invertida respecto al estandar
enable_pin: !PC3               ; pin compartido con Y y Z (todos se habilitan juntos)
microsteps: 32                 ; micropasos: mas suave, pero mas carga de CPU al procesar
rotation_distance: 40          ; mm por vuelta = polea GT2 20T × paso 2mm = 40mm
endstop_pin: !PA5              ; ! = logica invertida (NC: abierto en reposo, cierra al tocar)
position_endstop: -12          ; el nozzle puede ir hasta -12mm (el endstop esta fuera de la cama)
position_min: -12              ; limite de software minimo
position_max: 221              ; limite de software maximo (cama fisica 220mm)
homing_speed: 70               ; velocidad de la primera pasada de homing (mm/s)
homing_retract_dist: 5         ; retrocede 5mm tras tocar el endstop para la segunda pasada
homing_retract_speed: 30       ; velocidad del retroceso entre pasadas
second_homing_speed: 15        ; segunda pasada mas lenta para mayor precision de referencia

[tmc2208 stepper_x]
uart_pin:PB12
interpolate: false             ; sin interpolacion: usa micropasos reales (mas precision)
run_current:0.75               ; corriente de trabajo (A) - balance entre fuerza y temperatura del motor
sense_resistor: 0.150          ; resistencia de sensado de corriente de la placa base
stealthchop_threshold: 0       ; 0 = SpreadCycle siempre (mas torque, ligeramente mas ruidoso)

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3               ; pin compartido con X y Z
microsteps: 32
rotation_distance: 60          ; polea GT2 30T × paso 2mm = 60mm (eje Y usa polea mas grande)
endstop_pin: !PA6
position_endstop: -20          ; la cama puede ir 20mm detras del punto cero
position_min: -20
position_max: 223              ; cama 220mm + margen para homing
homing_speed: 70
homing_retract_dist: 5
homing_retract_speed: 30
second_homing_speed: 15

[tmc2208 stepper_y]
uart_pin:PB13
interpolate: false
run_current:0.80               ; subido de 0.75 (reduccion masa Y -400g). 0.80A = techo torque ~21k, termicamente SOSTENIBLE (0.95A daba OTPW en print real con cama caliente). Soporta max_accel 18k. Para mas corriente/accel: mod refrigeracion driver primero
sense_resistor: 0.150
stealthchop_threshold: 0

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 32
rotation_distance:8            ; tornillo T8 de 8mm de paso por vuelta
endstop_pin:probe:z_virtual_endstop#PA15   #probe:z_virtual_endstop ; Z usa el BLTouch como endstop virtual
position_max: 241              ; 1mm sobre el maximo fisico para evitar choques
position_min: -5               ; permite bajar 5mm bajo cero para ajustes finos del Z offset

[tmc2208 stepper_z]
uart_pin: PB14
interpolate: false
run_current: 0.8               ; corriente ligeramente mayor que X/Y: el Z carga el peso del gantry
stealthchop_threshold: 0
sense_resistor: 0.150

[safe_z_home]
home_xy_position: 109, 82      ; nozzle aqui → probe queda en el centro de la cama (109+1, 82+28 = 110,110)
speed: 100                     ; velocidad de viaje al punto de homing Z
z_hop: 5                       ; sube 5mm antes de cualquier movimiento XY para proteger la superficie
z_hop_speed: 25                ; velocidad del salto Z de seguridad

;============================
; BLTouch
;============================

[bltouch]
sensor_pin:PC14                ; pin de señal del sensor (entrada - detecta contacto de la aguja)
control_pin: PC13              ; pin de control del servo (salida - despliega y recoge la aguja)
x_offset: 1                    ; distancia del probe al nozzle en X (mm)
y_offset: 28                   ; distancia del probe al nozzle en Y: el probe va detras del nozzle
probe_with_touch_mode: true    ; modo touch: mas confiable en superficies PEI y vidrio
stow_on_each_sample: false     ; no recoge la aguja entre muestras: mas rapido (seguro con touch_mode)
speed: 5 #3                    ; velocidad de bajada al probar (mm/s) - lento para maxima precision
lift_speed: 15                 ; velocidad de subida tras cada muestra (mm/s)
samples: 2 #was3, cama trameada plana                  ; numero de muestras por punto de medicion
sample_retract_dist: 5         ; sube 5mm entre muestras para resetear el pin correctamente
samples_result: median         ; usa la mediana: descarta outliers mejor que el promedio
samples_tolerance: 0.030       ; diferencia maxima aceptable entre muestras (mm) - 0.005 causaba retry loops; 0.030 es lo que usan Creality y la comunidad
samples_tolerance_retries: 3   ; intentos adicionales si las muestras no convergen

;============================
; Nivelación de cama
;============================

[screws_tilt_adjust]
screw1: 27, 10                 ; posicion del nozzle para que el probe quede sobre el tornillo frontal izquierdo
screw1_name: front_left
screw2: 193, 10                ; tornillo frontal derecho
screw2_name: front_right
screw3: 193, 190               ; tornillo trasero derecho
screw3_name: rear_right
screw4: 27, 190                ; tornillo trasero izquierdo
screw4_name: rear_left
horizontal_move_z: 10          ; altura Z durante viajes entre tornillos
speed: 100                     ; velocidad de viaje entre puntos de medicion
screw_thread: CCW-M4           ; tornillos M4 de rosca izquierda (CCW = Counter-ClockWise)

[bed_mesh]
speed: 200                     ; velocidad de viaje entre puntos de la malla (mm/s) - 350 era demasiado agresivo; 150-250 es lo recomendado
horizontal_move_z: 5           ; altura Z durante los viajes de la malla
mesh_min: 10,10                ; esquina minima de la malla (incluye el offset del probe)
mesh_max: 210,210              ; esquina maxima de la malla
zero_reference_position: 110,110              ; re-cero malla en el centro (homing BLTouch + sonda PRTouch) - evita doble conteo con gcode_offset
probe_count: 7,7               ; grilla 7x7 = 49 puntos (cama suave: 9x9 era overkill, ver 2026-06-02). KAMP adaptativo desactivado
mesh_pps: 2, 2                 ; puntos interpolados entre mediciones reales - 2,2 da lookup cada ~14mm; suficiente para cama con 40mm entre puntos reales
algorithm: bicubic             ; splines cubicos por tramos - mejor que lagrange para 6x6 con variaciones locales; lagrange (grado 5) puede oscilar entre puntos adyacentes con alta diferencia
bicubic_tension: 0.2           ; tension de la curva (0=plano, 1=muy tenso) - 0.2 es conservador y estable
fade_start: 1.0                ; empieza a reducir la compensacion de malla desde 1mm de altura
fade_end: 10.0                 ; la compensacion desaparece completamente a 10mm (sobre esa altura la cama es plana)
fade_target: 0                 ; valor objetivo del fade (0 = sin compensacion al llegar al final)

;============================
; Sensor de filamento
;============================

[filament_switch_sensor filament_sensor]
switch_pin: !PC15              ; ! = logica invertida (NC: circuito cerrado con filamento)
pause_on_runout: true          ; pausa automaticamente al detectar fin de filamento
runout_gcode: RUNOUT_FILAMENT  ; macro ejecutada despues de la pausa (filamento retirado)
insert_gcode: RUNOUT_LOAD      ; macro ejecutada al detectar insercion de nuevo filamento
event_delay: 3.0               ; espera 3s antes de actuar (evita falsas detecciones por vibrado del extremo)
pause_delay: 0.5               ; pausa 0.5s entre el PAUSE y el runout_gcode para que el cabezal llegue al parking

;============================
; Extrusor
;============================

[extruder]
max_extrude_only_distance: 500 #default 1000 (lo cambie por no tener ese limite)
max_extrude_cross_section: 5.0 ; area maxima de seccion de extrusion (mm²) - 5.0 necesario para boquilla 0.6mm (LINE_PURGE falla con 3.0)
pressure_advance: 0.04  ; Valor inicial recomendado para Direct Drive
pressure_advance_smooth_time: 0.02 ; ventana de suavizado del pressure advance (segundos)
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3               ; pin compartido con XYZ
microsteps: 16                 ; 16 micropasos es estandar para extrusores directos (Sprite)
rotation_distance: 7.4522132928 ; mm de filamento por vuelta del motor (calibrado con metodo de 100mm)
nozzle_diameter: 0.6   ; boquilla Unicorn 0.6mm (informativo en Klipper; la extrusion real la define max_extrude_cross_section + slicer)
filament_diameter: 1.750
heater_pin: PA1                ; pin del calentador del hotend
sensor_type: EPCOS 100K B57560G104F ; termistor NTC 100K del hotend
sensor_pin: PC5                ; pin del sensor de temperatura del hotend
min_temp: 0                    ; bajo este valor Klipper entra en error de temperatura
max_temp: 315 # Set to 300 for S1 Pro (default 320, lo cambie pq no lo mantiene, se apaga el hotend)

#[tmc2208 extruder]
#uart_pin: PC7  # Confirma si este es tu pin UART de E. En la placa KE suele ser este o PC7.
#run_current: 0.75 ; Suficiente fuerza para el Sprite sin calentar el motor en exceso
#interpolate: False
#sense_resistor: 0.150
#stealthchop_threshold: 0 ; Desactivado para maximo torque (SpreadCycle)

;============================
; Cama caliente
;============================

[heater_bed]
heater_pin: PB2                ; pin del calentador de la cama
sensor_type: EPCOS 100K B57560G104F ; termistor NTC 100K de la cama
sensor_pin: PC4                ; pin del sensor de temperatura de la cama
min_temp: 0
max_temp: 120                  ; limite maximo de seguridad para la cama

;============================
; Verificación de calentadores
;============================

[verify_heater extruder]
check_gain_time: 120           ; segundos para verificar que el hotend sube de temperatura al encender
heating_gain: 1.0              ; minimo de grados que debe subir en check_gain_time para no dar error
hysteresis: 10                 ; tolerancia de °C respecto al target antes de activar la verificacion

[verify_heater heater_bed]
check_gain_time: 120           ; la cama tarda mas en calentar, por eso 120s (default es 60s)
heating_gain: 1.0
hysteresis: 10

;============================
; Ventiladores
;============================

[fan]                          ; ventilador de capa - controlado por M106/M107 desde el slicer
pin: PA0
max_power: 1.0
cycle_time: 0.010              ; periodo PWM de 10ms (100Hz)
hardware_pwm: False            ; PWM por software (pin no soporta hardware PWM)
shutdown_speed: 0              ; se apaga al detener Klipper
kick_start_time: 0.200         ; pulso de 200ms al arrancar para vencer la inercia del motor

[heater_fan nozzle_fan]        ; ventilador del hotend - se activa automaticamente con la temperatura
pin: PC1
max_power: 1.0
shutdown_speed: 1.0            ; permanece encendido al detener Klipper (protege el hotend del calor residual)
cycle_time: 0.010
hardware_pwm: False
kick_start_time: 0.100
off_below: 0.0
heater: extruder               ; vinculado al extrusor: se activa cuando supera heater_temp
fan_speed: 1.0                 ; velocidad fija al 100% cuando esta activo
heater_temp: 40.0              ; se activa si el nozzle supera 40°C; se apaga al bajar de 40°C

[output_pin MainBoardFan]
pin: !PB1                      ; ventilador de la placa base (activo en LOW)
value: 1                       ; SIEMPRE ENCENDIDO: value 1 + pin invertido = fisico LOW = ventilador ON. El default 0 lo dejaba apagado (refrigera los TMC2208, clave para corriente alta en Y)
shutdown_value: 1              ; sigue refrigerando aunque Klipper entre en shutdown

;============================
; Retraccion por firmware
;============================

[firmware_retraction]
retract_length: 0.6            ; longitud de retraccion (mm) - direct drive: tipico 0.4-1.0mm
retract_speed: 40              ; velocidad de retraccion (mm/s)
unretract_extra_length: 0      ; longitud extra al des-retraer (0 = igual que la retraccion)
unretract_speed: 40            ; velocidad de des-retraccion (mm/s)

;============================
; Alineacion 90 grados X Y
;============================

[skew_correction]              ; activa correccion de sesgo geometrico XY/XZ/YZ (perfil cargado en START_PRINT)


;============================
; Input Shaper (opcional)
;============================

[input_shaper]                 ; los valores calibrados con ADXL345 estan en el bloque SAVE_CONFIG al final



[hx711s]
sensor0_clk_pin: PA4
sensor0_sdo_pin: PC6
use_mcu: mcu

