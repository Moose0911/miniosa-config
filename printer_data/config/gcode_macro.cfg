[gcode_macro START_PRINT]
description: Inicio optimizado con KAMP y No-Ooze
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
  {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}

  G90                              ; posicionamiento absoluto
  M83                              ; extrusor en modo relativo
  M117 Precalentando nozzle (150C)...
  M104 S150                        ; precalienta nozzle a 150C: evita ooze sin endurecer restos
  M117 Calentando cama...
  M140 S{BED_TEMP}                 ; inicia calentamiento de cama sin esperar (no bloqueante)

  M117 Homing...
  G28                              ; homing de los 3 ejes (X Y Z)

  M117 Esperando cama ({BED_TEMP}C)...
  M190 S{BED_TEMP}                 ; espera cama a temperatura objetivo (bloqueante)

  {% set svv = printer.save_variables.variables %}
  {% set mesh_count = svv.mesh_count | default(10) | int %}
  {% set mesh_bed_temp = svv.mesh_bed_temp | default(0) | float %}   ; bed_temp al que se calibro la malla cacheada
  {% set temp_diff = (BED_TEMP - mesh_bed_temp) | abs %}             ; cuanto cambio el bed_temp respecto a la malla guardada
  BED_MESH_CLEAR                   ; descarta malla anterior de memoria
  {% if mesh_count >= 10 or temp_diff > 5 %}
  {% if temp_diff > 5 and mesh_count < 10 %}
  M117 Bed temp cambio {temp_diff|round(0)}C - recalibrando malla...
  {action_respond_info("Malla recalibrada: bed_temp cambio %.0fC (cacheada a %.0fC, ahora %.0fC). La dilatacion termica invalida la malla anterior." % (temp_diff, mesh_bed_temp, BED_TEMP))}
  {% else %}
  M117 Calibrando malla COMPLETA...
  {% endif %}
  _BED_MESH_CALIBRATE              ; FULL-BED 9x9 (usa probe_count/mesh_min/max de printer.cfg). Evita el override adaptativo de KAMP -> cubre TODA la cama. AUTO-GUARDA al perfil 'default' (NO hace falta SAVE=default, que ademas da "reserved" en esta version de Klipper). Queda cacheada para las 9 impresiones siguientes
  SAVE_VARIABLE VARIABLE=mesh_count VALUE=1
  SAVE_VARIABLE VARIABLE=mesh_bed_temp VALUE={BED_TEMP}   ; registra el bed_temp de esta calibracion para comparar en los proximos prints
  {% else %}
  M117 Malla guardada ({mesh_count}/10)...
  BED_MESH_PROFILE LOAD=default    ; carga la malla previa - ahorra 2-3 min (bed_temp dentro de +-5C del cacheado)
  SAVE_VARIABLE VARIABLE=mesh_count VALUE={mesh_count + 1}
  {% endif %}
  SKEW_PROFILE LOAD=MiniOsaSkew   ; aplica la correccion de skew calibrada

  M117 Smart Park...
  SMART_PARK                       ; aparca el cabezal cerca del objeto a imprimir (KAMP)

  M117 Calentando Nozzle a {EXTRUDER_TEMP}C...
  M109 S{EXTRUDER_TEMP}            ; espera nozzle a temperatura de impresion (bloqueante)

  M117 Limpiando nozzle...
  WIPE_NOZZLE                      ; primera limpieza: quita blobs antes del PRTouch

  PRTOUCH_SET_ZOFFSET BED_TEMP={BED_TEMP}  ; auto Z-offset: recalibra (con WIPE extra) cada 10 prints o cambio >5C cama

  M117 Purgando...
  LINE_PURGE                       ; purga una linea junto al borde del objeto (KAMP)

  M117 Imprimiendo...


[gcode_macro END_PRINT]
description: Finaliza la impresion, retrae y presenta la pieza
gcode:
  TURN_OFF_HEATERS                 ; apaga cama y nozzle inmediatamente

  G91                              ; cambia a posicionamiento relativo
  G1 E-2 F2700                     ; retrae 2mm de filamento para evitar ooze al subir
  G1 Z2 F3000                      ; sube 2mm para despejar la superficie de la pieza

  G90                              ; vuelve a posicionamiento absoluto
  G1 X{printer.toolhead.axis_maximum.x - 5} Y{printer.toolhead.axis_maximum.y - 5} F6000 ; presenta la pieza al frente del operador

  M107                             ; apaga ventilador de capa

  M84 X Y E                        ; desactiva motores X Y E (Z queda activo: sostiene el gantry)

  BED_MESH_CLEAR                   ; limpia la malla de memoria
  SET_SKEW CLEAR=1                 ; resetea la correccion de skew
  M117 Impresion Finalizada.


[gcode_macro M600]
description: Cambio de filamento mid-print
gcode:
  {% set X = params.X|default(10)|float %}
  {% set Y = params.Y|default(10)|float %}
  {% set Z_MIN = params.Z_MIN|default(50)|float %}
  PAUSE X={X} Y={Y} Z_MIN={Z_MIN} ; pausa la impresion y aparca el cabezal
  M83                              ; extrusor en modo relativo
  G1 E-15 F1800                    ; retraccion larga: aleja el filamento del hotend para cambiar
  G92 E0                           ; resetea el contador de extrusor
  M117 Listo para cambio - Resume cuando este cargado.


[gcode_macro CALIBRAR_Z_OFFSET]
description: Pre-posiciona rapido al centro y calibra Z offset
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28                            ; hace homing si no esta referenciado
  {% endif %}
  G90                              ; posicionamiento absoluto
  G1 Z10 F1500                     ; sube a Z10 para viaje seguro
  G1 X109 Y82 F6000                ; posiciona rapido: probe queda en centro de cama (110,110)
  PROBE_CALIBRATE                  ; calibracion interactiva del Z offset con papel


[gcode_macro PRINTER_PARAM]
# Variables de configuracion usadas por macros del firmware Creality
variable_z_safe_pause: 0.0        # altura Z minima al pausar
variable_max_x_position: 220.0    # limite maximo X de la cama
variable_max_y_position: 220.0    # limite maximo Y de la cama
variable_max_z_position: 240.0    # altura maxima Z
variable_fans: 3                   # numero de ventiladores
variable_auto_g29: 0               # 0 = sin auto-nivelacion al inicio
variable_default_bed_temp: 60      # temperatura cama por defecto
variable_default_extruder_temp: 220 # temperatura nozzle por defecto
variable_g28_extruder_temp: 140    # temperatura nozzle durante homing
variable_print_calibration: 0      # flag de calibracion en curso
variable_fan0_min: 140             # PWM minimo del ventilador 0
variable_hotend_temp: 240          # temperatura maxima del hotend
gcode:


[gcode_macro STRUCTURE_PARAM]
# Dimensiones fisicas de la impresora y offsets de herramientas adicionales
variable_bed_length: 220           # largo de la cama (mm)
variable_bed_width: 220            # ancho de la cama (mm)
variable_bed_hight: 240            # altura maxima de impresion (mm)
variable_laser_x_offset: 45.0     # offset X del laser (no usado en esta config)
variable_laser_y_offset: -8.0     # offset Y del laser
variable_laser_z_offset: 3.0      # offset Z del laser
variable_cali_x_offset: 204.0     # posicion X del punto de calibracion
variable_cali_y_offset: 14.0      # posicion Y del punto de calibracion
variable_cali_z_offset: 3.0       # offset Z del punto de calibracion
gcode:


[gcode_macro _CLIENT_VARIABLE]
# Configuracion de comportamiento de PAUSE / RESUME / CANCEL para Mainsail
variable_use_custom_pos   : True   # usa posicion de aparcado personalizada
variable_custom_park_x    : 10.0   # posicion X al pausar (mm)
variable_custom_park_y    : 10.0   # posicion Y al pausar (mm)
variable_custom_park_dz   : 15.0   # hop Z al pausar (mm) - 50mm empujaba el gantry al limite fisico en prints altos; 15mm es suficiente
variable_retract          : 2.0    # retraccion al pausar (mm)
variable_cancel_retract   : 5.0    # retraccion al cancelar (mm)
variable_speed_retract    : 20.0   # velocidad de retraccion (mm/s)
variable_unretract        : 1.5    # des-retraccion al reanudar (mm)
variable_speed_unretract  : 20.0   # velocidad de des-retraccion (mm/s)
variable_speed_hop        : 15.0   # velocidad del salto Z al pausar (mm/s)
variable_speed_move       : 150.0  # velocidad de viaje al aparcado (mm/s)
variable_park_at_cancel   : True   # aparca el cabezal al cancelar
variable_park_at_cancel_x : 10.0   # posicion X al cancelar (mm)
variable_park_at_cancel_y : 220.0  # posicion Y al cancelar (mm)
variable_runout_sensor    : "filament_switch_sensor filament_sensor" # sensor que Mainsail verifica antes de RESUME
gcode:


[gcode_macro LOAD_FILAMENT]
description: Carga filamento - TEMP=220 por defecto
gcode:
  {% set TEMP = params.TEMP|default(220)|float %}
  SAVE_GCODE_STATE NAME=load_state ; guarda posicion y modo actual para restaurar al final
  M117 Calentando para carga...
  M109 S{TEMP}                     ; espera temperatura de carga (bloqueante)
  M117 Cargando filamento...
  M83                              ; extrusor en modo relativo
  G1 E50 F300                      ; empuja filamento rapido por el tubo hasta el hotend
  G1 E20 F150                      ; empuje lento final para purgar y asentar el plastico
  G92 E0                           ; resetea contador de extrusor
  RESTORE_GCODE_STATE NAME=load_state ; restaura posicion y modo anteriores
  M117 Filamento cargado.


[gcode_macro UNLOAD_FILAMENT]
description: Descarga filamento - TEMP=220 por defecto
gcode:
  {% set TEMP = params.TEMP|default(220)|float %}
  SAVE_GCODE_STATE NAME=unload_state ; guarda posicion y modo actual
  M117 Calentando para descarga...
  M109 S{TEMP}                       ; espera temperatura de descarga (bloqueante)
  M117 Descargando filamento...
  M83                                ; extrusor en modo relativo
  G1 E5 F300                         ; avance corto para aliviar presion antes de retraer
  G1 E-50 F1000                      ; retraccion rapida para extraer el filamento
  G92 E0                             ; resetea contador de extrusor
  RESTORE_GCODE_STATE NAME=unload_state ; restaura estado anterior
  M117 Filamento descargado.


[gcode_macro RUNOUT_FILAMENT]
description: Se ejecuta DESPUES de PAUSE (pause_on_runout=true ya aparcó el cabezal)
gcode:
  M83                              ; extrusor en modo relativo
  G1 E-5 F1800                     ; retraccion corta para direct drive (KE Sprite ~25mm de ruta); 15mm era excesivo y perdía el agarre del motor
  G92 E0                           ; resetea contador de extrusor
  M117 Filamento agotado - carga nuevo y Resume
  {action_respond_info("Filamento agotado: carga nuevo filamento y presiona Resume")}


[gcode_macro RUNOUT_LOAD]
description: Se dispara al detectar insercion de filamento - solo actua si la impresora esta pausada
gcode:
  {% if not printer.pause_resume.is_paused %}
    M117 Insercion detectada - impresora no pausada, ignorado ; evita dispararse durante LOAD_FILAMENT normal
  {% else %}
    {% set target = printer.extruder.target %}
    {% if target < 170 %}
      {% set target = 220 %}       ; temperatura minima segura si el heater estaba apagado
    {% endif %}
    {% if printer.extruder.temperature < (target - 5) %}
      M117 Esperando temperatura del nozzle...
      M109 S{target}               ; espera temperatura antes de extruir (evita tapon frio)
    {% endif %}
    M83                            ; extrusor en modo relativo
    G1 E50 F300                    ; carga el nuevo filamento por el tubo
    G1 E20 F150                    ; purga lento para asegurar plastico nuevo en el nozzle
    G92 E0                         ; resetea contador de extrusor
    RESUME                         ; reanuda la impresion
  {% endif %}


[gcode_macro NIVELAR_CAMA]
description: Viaje rapido al centro + SCREWS_TILT_CALCULATE
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28                            ; hace homing si no esta referenciado
  {% endif %}
  G90                              ; posicionamiento absoluto
  G1 Z10 F1500                     ; sube a Z10 para viaje seguro entre puntos
  G1 X109 Y82 F6000                ; centra rapido antes de iniciar (el viaje entre tornillos usa velocidad del probe)
  SCREWS_TILT_CALCULATE            ; mide cada tornillo y calcula cuanto girar (OJO: SCREWS_TILT_ADJUST no existe como comando, es solo el nombre de la seccion en printer.cfg)


[gcode_macro MALLA_COMPLETA]
description: Calibracion de referencia a temperatura real - KAMP usa 9x9 bicubic para el area completa
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28                            ; hace homing si no esta referenciado
  {% endif %}
  {% if printer.heater_bed.temperature < (BED_TEMP - 5) %}
    M117 Calentando cama a {BED_TEMP}C para malla precisa...
    M140 S{BED_TEMP}               ; inicia calentamiento sin bloquear
    M190 S{BED_TEMP}               ; espera temperatura: la cama se deforma con el calor, medir en frio es impreciso
  {% endif %}
  BED_MESH_CLEAR                   ; descarta la malla activa antes de calibrar
  _BED_MESH_CALIBRATE              ; malla FULL-BED real 9x9 bicubic (printer.cfg). _BED_MESH_CALIBRATE = el original, sin el override adaptativo de KAMP
  M117 Malla lista. Ejecuta SAVE_CONFIG para guardar.


[gcode_macro WIPE_NOZZLE]
description: Limpia el nozzle en el cepillo lateral. Llamar con nozzle ya a temperatura.
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28                            ; hace homing si no esta referenciado
  {% endif %}

  SAVE_GCODE_STATE NAME=wipe_state
  G90                              ; posicionamiento absoluto

  M117 Limpiando nozzle...
  G1 Z10 F1200                    ; sube Z para viaje seguro antes de mover X
  G1 X-11 Y30 F6000               ; posicion de entrada: X minimo, Y fuera del cepillo
  G1 Z-2 F600                     ; baja lento al nivel del cepillo (limite fisico Z-2)

  G1 Y-19 F6000                   ; pasada 1 - cama adelante
  G1 Y21 F6000                    ; pasada 1 - cama atras
  G1 Y-19 F6000                   ; pasada 2 - cama adelante
  G1 Y21 F6000                    ; pasada 2 - cama atras
  G1 Y-19 F6000                   ; pasada 3 - cama adelante
  G1 Y21 F6000                    ; pasada 3 - cama atras

  G1 Z10 F1200                    ; sube Z antes de abandonar la zona del cepillo

  RESTORE_GCODE_STATE NAME=wipe_state
  M117 Nozzle limpio.


[gcode_macro CHECK_Y]
description: Muestra el estado del driver TMC del eje Y (flags de temperatura otpw/ot/t120, corriente, etc)
gcode:
  DUMP_TMC STEPPER=stepper_y


[delayed_gcode driver_temp_watch]
# Vigila el OTPW (>120C) del driver Y durante prints y lo saca por M117 (visible en KlipperScreen).
# Nota: drv_status solo tiene datos cuando los steppers estan activos; en reposo es null y se omite.
initial_duration: 15
gcode:
  {% set st = printer["tmc2208 stepper_y"].drv_status %}
  {% if st %}
    {% if st.ot %}
      M117 !!! DRIVER Y >150C (OT) - PARANDO RIESGO
      {action_respond_info("CRITICO: driver Y en OVERTEMP (ot=1, >150C). Baja corriente y revisa refrigeracion.")}
    {% elif st.otpw %}
      M117 ADVERTENCIA: Driver Y >120C (OTPW)
      {action_respond_info("ALERTA: driver Y en OTPW (>120C, t120). Margen reducido: baja corriente o sube refrigeracion.")}
    {% endif %}
  {% endif %}
  UPDATE_DELAYED_GCODE ID=driver_temp_watch DURATION=15


# ─────────────────────────────────────────────────────────────────────────────
# PRTouch — Calibración automática de Z-offset con la galga (load cell)
# Offset = -contact_z aplicado en ABSOLUTO (Z=, no Z_ADJUST): idempotente, sin
# acumulación entre prints (ese era el bug). El umbral 8000 dispara ~0.11mm bajo
# la superficie real, así offset ≈ +0.04 deja G-Z0 con squish suave (nozzle 235C).
# Uso: PRTOUCH_SET_ZOFFSET (llama desde START_PRINT tras G28, antes de imprimir)
# ─────────────────────────────────────────────────────────────────────────────

[gcode_macro PRTOUCH_SET_ZOFFSET]
description: Auto Z-offset via PRTouch con cache. Recalibra cada 10 prints o si cambia bed_temp >5C.
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set X = params.X|default(110)|float %}
    {% set Y = params.Y|default(110)|float %}
    {% set svv = printer.save_variables.variables %}
    {% set zoffset_count    = svv.zoffset_count    | default(10) | int %}
    {% set zoffset_bed_temp = svv.zoffset_bed_temp | default(0)  | float %}
    {% set contact_z        = svv.prtouch_contact_z| default(0.12)| float %}
    {% set temp_diff = (BED_TEMP - zoffset_bed_temp) | abs %}

    {% if zoffset_count >= 10 or temp_diff > 5 %}
        {% if temp_diff > 5 and zoffset_count < 10 %}
            M117 PRTouch: bed_temp cambio {temp_diff|round(0)}C - recalibrando Z...
            {action_respond_info("PRTouch: recalibrando Z (temp cambio %.0fC: cacheado %.0fC ahora %.0fC)" % (temp_diff, zoffset_bed_temp, BED_TEMP))}
        {% else %}
            M117 PRTouch: calibrando Z-offset (print #{zoffset_count})...
        {% endif %}
        {% if printer.extruder.temperature >= 150 %}
            M117 PRTouch: limpiando boquilla (caliente)...
            WIPE_NOZZLE
        {% else %}
            M117 PRTouch: nozzle frio — saltando wipe
            {action_respond_info("PRTouch: nozzle a %.0fC, wipe omitido (min 150C)" % printer.extruder.temperature)}
        {% endif %}
        PRTOUCH_PROBE_MULTI X={X} Y={Y} NPOINTS=2 DIST=25 AXIS=Y APPLY=1 REF=0
        SAVE_VARIABLE VARIABLE=zoffset_count VALUE=1
        SAVE_VARIABLE VARIABLE=zoffset_bed_temp VALUE={BED_TEMP}
    {% else %}
        M117 PRTouch: Z cacheado ({zoffset_count}/10) — aplicando offset...
        SET_GCODE_OFFSET Z={contact_z * -1} MOVE=0
        SAVE_VARIABLE VARIABLE=zoffset_count VALUE={zoffset_count + 1}
        {action_respond_info("PRTouch: Z cacheado — contacto=%.4fmm offset=%.4fmm (%d/10)" % (contact_z, contact_z * -1, zoffset_count + 1))}
    {% endif %}
#### gcode_shell_command + BACKUP_AHORA (super-machine 2026-06-03) ####
[gcode_shell_command backup_cfg]
command: bash /home/biqu/klipper-backup/script.sh
timeout: 120.0
verbose: True

[gcode_macro BACKUP_AHORA]
description: Respalda la configuracion al repo privado de GitHub ahora
gcode:
    {action_respond_info("Respaldando configuracion a GitHub...")}
    RUN_SHELL_COMMAND CMD=backup_cfg

#### G28 override: tras homear, llevar la BOQUILLA al centro (no el probe) - 2026-06-03 ####
[gcode_macro G28]
rename_existing: G28.1
gcode:
    G28.1 {rawparams}
    _CENTER_NOZZLE

[gcode_macro _CENTER_NOZZLE]
description: Tras G28 lleva la boquilla al centro de la cama si X/Y estan homeados
gcode:
    {% set th = printer.toolhead %}
    {% if 'x' in th.homed_axes and 'y' in th.homed_axes %}
        {% set was_abs = printer.gcode_move.absolute_coordinates %}
        G90
        {% if 'z' in th.homed_axes %}
            {% set safe_z = [printer.gcode_move.gcode_position.z, 10.0]|max %}
            G1 Z{safe_z} F600
        {% endif %}
        G1 X110 Y110 F6000
        {% if not was_abs %}G91{% endif %}
    {% endif %}
